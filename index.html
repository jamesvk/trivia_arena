<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Trivia Arena</title>
    </head>
    <body>
        <h1>Trivia Battle</h1>
        <section class="home">
            <p class="home-description">
                Welcome to Trivia Battle! Click Begin to choose a category
                and start the game. You'll have 30 seconds to answer each 
                question. Good Luck!
            </p>
            <!-- <form> -->
                <input
                    type="text"
                    required
                    class="form-input"
                    id="player-name-input"
                    name="playerName"
                    placeholder="Enter Name"
                />
                <button type="submit" id="home-btn">
                    Begin
                </button>
            <!-- </form> -->

        </section>
        <section class="categories">
            <h2>Choose A Category</h2>
            <ul class="category-list">
                <li class="category-item">Music</li>
                <li class="category-item">Sports</li>
                <li class="category-item">Movies</li>
                <li class="category-item">General Knowledge</li>
            </ul>
            <button type="submit" id="start-btn">
                Start
            </button>
        </section>
        <section class="quiz">
            <!-- <div id="quiz-timer">
                <p id="timer-display">00:05</p>
            </div> -->
            <form class="quiz-form">
                <fieldset class="quiz-fieldset">

                </fieldset>
            </form>
            <button type="submit" id="submit-btn">
                Final Answer
            </button>
        </section>
        <section class="scoreboard">
            <h3>Scoreboard</h3>
            <ul class="scoreboard-list">

            </ul>
        </section>
        <section class="results-actions">
            <div class="results-actions_item results-actions_again">
                <button type="button" id="play-again-btn" class="btn">
                    Play Again
                </button>
            </div>
            <div class="results-actions_item results-actions_reset">
                <button type="button" id="reset-btn" class="btn">
                    Reset Scoreboard
                </button>
            </div>
        </section>
        <script src="script.js" type="module"></script>
        <script src="data/questions.js" type="module"></script>
    </body>
</html>
